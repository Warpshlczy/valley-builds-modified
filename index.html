<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- 手机端适配（不影响电脑） -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center; 
  align-items: center;    
  background: #222;
}

#game ruffle-player {
  width: 760px !important;
  height: 600px !important;
  display: block;
}

#game canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
</style>
</head>
<body>
<div id="game"></div>

<script>
// 电脑=自托管，手机=CDN
const isMobile = /Android|iPhone|iPad|iPod|HarmonyOS/i.test(navigator.userAgent);
const script = document.createElement('script');

// 电脑端：加载本地 ruffle/ruffle.js
if (!isMobile) {
    script.src = "ruffle/ruffle.js";
} 
// 手机端：加载官方CDN
else {
    script.src = "https://unpkg.com/@ruffle-rs/ruffle";
}

// 等待Ruffle加载完成后，再执行游戏代码
script.onload = async function() {
// ===================== Core =====================
    const player = window.RufflePlayer.newest().createPlayer();
    document.getElementById("game").appendChild(player);

    await player.load({
        url: "game.swf",
        viewport: { width: 760, height: 600 }
    });
};

// 加载脚本
document.head.appendChild(script);

// ===================== 弹窗提示 =====================
alert("某大学的七位工程师受世界首富聘请先后前往荒岛山谷进行开发和建设。\r\n  \r\n因此您需要选择决定工程师们前往岛屿的顺序。\r\n \r\n")
alert("不同的排列组合将会影响工程师们的等级和最终岛屿开发的程度和结局。\r\n")
alert("注意工程师们的上岛顺序很重要！工程师们之间的联动配合程度会影响建设的程度和结局。")
alert("游戏存在多个普通结局，一个完美结局，一个彩蛋结局。")
alert("祝您玩得开心！加载完后点击按钮开始。")
</script>
</body>
</html>

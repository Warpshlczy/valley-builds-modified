<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- 允许全局双指缩放，包括 alert -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">

<!-- ======================================
【核心修改】强制Ruffle只读本地WASM, 禁止远程下载
======================================= -->
<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
  // 彻底禁用CDN回退（手机端核心！绝不远程下载WASM）
  forceCDN: false,
  // 指定本地资源根目录（你的ruffle文件夹）
  publicPath: "./ruffle/",
  // 鸿蒙/华为兼容：禁用WASM流式加载
  wasm: { streaming: false },
  // 基础配置不变
  autoplay: "on",
  allowScriptAccess: "sameDomain",
  allowNetworking: "all",
};
</script>

<!-- 你原有的本地Ruffle引入（不动） -->
<script src="ruffle/ruffle.js"></script>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #222;
  overflow: hidden;
}

/* 电脑端默认：居中游戏 */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 移动设备 */
@media (pointer: coarse) {
  body {
    display: block;
    overflow: hidden;
  }
  
  #game-wrapper {
    width: 100vw;
    height: 100vh;
    overflow: scroll;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  
  #zoom-container {
    width: 760px;
    height: 600px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
  }
}

#game {
  width: 760px;
  height: 600px;
  background: #000;
}

#game ruffle-player {
  width: 760px !important;
  height: 600px !important;
  display: block;
}

#game canvas {
  width: 760px !important;
  height: 600px !important;
  display: block;
}
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="zoom-container">
    <div id="game"></div>
  </div>
</div>

<script>
// 检测设备类型
function isMobileDevice() {
  return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
}

// 检测华为 / 鸿蒙系统
function isHuaweiOrHarmony() {
  const ua = navigator.userAgent.toLowerCase();
  return ua.includes("huawei") || ua.includes("harmony");
}

// 加载失败提示
function showLoadError() {
  let msg = "⚠️ 游戏加载失败！\n\n请检查本地Ruffle文件是否完整";
  
  if (isHuaweiOrHarmony()) {
    msg += "\n\n❗ 华为 / 鸿蒙系统：如本地文件失效，可尝试开启代理";
  } else if (isMobileDevice()) {
    msg += "\n\n如仍无法加载，请检查文件路径";
  }
  
  alert(msg);
}

window.onload = async () => {
  try {
    // 先检测 Ruffle 是否存在
    if (!window.RufflePlayer) {
      showLoadError();
      return;
    }

    const player = window.RufflePlayer.newest().createPlayer();
    document.getElementById("game").appendChild(player);

    // 加载游戏，超时 15 秒
    await Promise.race([
      player.load({
        url: "game.swf",
        viewport: { width: 760, height: 600 }
      }),
      new Promise((_, reject) => setTimeout(() => reject("timeout"), 15000))
    ]);

    // 手机端开启缩放
    if (isMobileDevice()) {
      initPinchZoom();
    }

  } catch (err) {
    showLoadError();
  }
};

// 双指缩放
function initPinchZoom() {
  const zoomContainer = document.getElementById('zoom-container');
  const gameWrapper = document.getElementById('game-wrapper');
  
  let scale = 1.0;
  let lastDistance = 0;
  let isPinching = false;
  
  function calculateInitialScale() {
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;
    const gameWidth = 760;
    const gameHeight = 600;
    const scaleX = screenWidth / gameWidth;
    const scaleY = screenHeight / gameHeight;
    return Math.min(scaleX, scaleY, 1.0);
  }
  
  function applyTransform() {
    zoomContainer.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  
  function getDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  
  scale = calculateInitialScale();
  applyTransform();
  
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      isPinching = true;
      lastDistance = getDistance(e.touches);
    }
  });
  
  document.addEventListener('touchmove', (e) => {
    if (isPinching && e.touches.length === 2) {
      const currentDistance = getDistance(e.touches);
      const scaleChange = currentDistance / lastDistance;
      scale = Math.max(0.3, Math.min(5.0, scale * scaleChange));
      applyTransform();
      lastDistance = currentDistance;
    }
  });
  
  document.addEventListener('touchend', () => {
    isPinching = false;
  });

  // 双击重置
  document.addEventListener('dblclick', () => {
    scale = calculateInitialScale();
    applyTransform();
  });
}

// 游戏提示
alert("某大学的七位学科工程师受聘先后前往荒岛山谷进行开发和建设。\r\n  \r\n因此您需要选择决定工程师们前往岛屿的顺序。\r\n \r\n")
alert("不同的排列组合将会影响工程师们的等级和最终岛屿开发的程度和结局。\r\n")
alert("注意工程师们的上岛顺序很重要！工程师们之间的联动配合程度会影响建设的程度和结局。")
alert("游戏存在多个普通结局，一个完美结局，一个彩蛋结局。")
alert("Remastered by: 老六 - Mokie")

if (isMobileDevice()) {
  alert("手机端提示：您可以使用双指捏合手势放大缩小游戏画面，双击屏幕可重置大小。");
}

alert("祝您玩得开心！加载完后点击按钮开始。");
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
<script src="ruffle/ruffle.js"></script>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #222;
  overflow: hidden;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
}
@media (pointer: coarse) {
  body {
    display: block;
    overflow: hidden;
  }
  #game-wrapper {
    width: 100vw;
    height: 100vh;
    overflow: scroll;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  #zoom-container {
    width: 760px;
    height: 600px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
  }
}
#game {
  width: 760px;
  height: 600px;
  background: #000;
}
#game ruffle-player, #game canvas {
  width: 760px !important;
  height: 600px !important;
  display: block;
}
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="zoom-container">
    <div id="game"></div>
  </div>
</div>

<script>
// 关键配置：只禁用远程更新，不强制指定wasm路径，让JS自动识别
window.RufflePlayerConfig = {
  updater: false,                  // 关闭自动更新
  allowScriptAccess: false,
  forceHttps: false
};

function isMobileDevice() {
  return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
}

function showLoadError() {
  alert("⚠️ 游戏加载失败！\n请清除浏览器缓存后重试");
}

window.onload = async () => {
  try {
    if (!window.RufflePlayer) {
      showLoadError();
      return;
    }

    const player = window.RufflePlayer.newest().createPlayer();
    document.getElementById("game").appendChild(player);

    await Promise.race([
      player.load({
        url: "game.swf",
        viewport: { width: 760, height: 600 }
      }),
      new Promise((_, reject) => setTimeout(() => reject("timeout"), 15000))
    ]);

    if (isMobileDevice()) {
      initPinchZoom();
    }

  } catch (err) {
    console.error(err);
    showLoadError();
  }
};

// 双指缩放
function initPinchZoom() {
  const zoomContainer = document.getElementById('zoom-container');
  const gameWrapper = document.getElementById('game-wrapper');
  
  let scale = 1.0;
  let lastDistance = 0;
  let isPinching = false;
  
  function calculateInitialScale() {
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;
    const scaleX = screenWidth / 760;
    const scaleY = screenHeight / 600;
    return Math.min(scaleX, scaleY, 1.0);
  }
  
  function applyTransform() {
    zoomContainer.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  
  function getDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  
  scale = calculateInitialScale();
  applyTransform();
  
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      isPinching = true;
      lastDistance = getDistance(e.touches);
    }
  });
  
  document.addEventListener('touchmove', (e) => {
    if (isPinching && e.touches.length === 2) {
      const currentDistance = getDistance(e.touches);
      scale = Math.max(0.3, Math.min(5.0, scale * (currentDistance / lastDistance)));
      applyTransform();
      lastDistance = currentDistance;
    }
  });
  
  document.addEventListener('touchend', () => {
    isPinching = false;
  });

  document.addEventListener('dblclick', () => {
    scale = calculateInitialScale();
    applyTransform();
  });
}

// 游戏提示
alert("某大学的七位学科工程师受聘先后前往荒岛山谷进行开发和建设。\n\n因此您需要选择决定工程师们前往岛屿的顺序。\n\n");
alert("不同的排列组合将会影响工程师们的等级和最终岛屿开发的程度和结局。\n");
alert("注意工程师们的上岛顺序很重要！工程师们之间的联动配合程度会影响建设的程度和结局。");
alert("游戏存在多个普通结局，一个完美结局，一个彩蛋结局。");
alert("Remastered by: 老六 - Mokie");

if (isMobileDevice()) {
  alert("手机端提示：双指捏合缩放游戏画面，双击重置大小。");
}

alert("祝您玩得开心！加载完后点击按钮开始。");
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center; 
  align-items: center;    
  background: #222;
}

#game ruffle-player {
  width: 760px !important;
  height: 600px !important;
  display: block;
}

#game canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
</style>
</head>
<body>
<div id="game"></div>

<script>
window.onload = async () => {
  const player = window.RufflePlayer.newest().createPlayer();
  document.getElementById("game").appendChild(player);

  await player.load({
    url: "game.swf",
    viewport: { width: 760, height: 600 }
  });
};

    alert("注意工程师们的上岛顺序很重要！工程师们之间的联动配合程度会影响建设的程度和结局。")

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
<script src="ruffle/ruffle.js"></script>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #222;
  overflow: hidden;
}

/* 电脑端默认：直接居中游戏容器 */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

#game {
  width: 760px;
  height: 600px;
  background: #000;
}

#game ruffle-player {
  width: 760px !important;
  height: 600px !important;
  display: block;
}

#game canvas {
  width: 760px !important;
  height: 600px !important;
  display: block;
}

/* ====================================== */
/* 👇 所有移动端专属样式，全部放进媒体查询里 */
/* ====================================== */
@media (pointer: coarse) {
  body {
    display: block;
    overflow: hidden;
  }
  
  #game-wrapper {
    width: 100vw;
    height: 100vh;
    overflow: scroll;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  
  #zoom-container {
    width: 760px;
    height: 600px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
  }
  
  /* 移动端游戏容器不需要固定宽高，由父容器控制 */
  #game {
    width: 100%;
    height: 100%;
  }
}

/* 电脑端隐藏移动端专属容器 */
@media (pointer: fine) {
  #game-wrapper, #zoom-container {
    display: contents;
  }
}

</style>
</head>
<body>
<div id="game-wrapper">
  <div id="zoom-container">
    <div id="game"></div>
  </div>
</div>

<script>
// ✅ 改进的设备检测：严格区分真正的移动设备
function isMobileDevice() {
  const hasTouchScreen = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  const isSmallScreen = window.innerWidth < 1024;
  
  // 必须同时满足：有触摸屏 + 移动设备UA + 小屏幕
  return hasTouchScreen && isMobileUA && isSmallScreen;
}

// 检测华为 / 鸿蒙系统
function isHuaweiOrHarmony() {
  const ua = navigator.userAgent.toLowerCase();
  return ua.includes("huawei") || ua.includes("harmony");
}

// 加载失败提示
function showLoadError() {
  let msg = "⚠️ 游戏加载失败！\n\n请检查网络连接是否正常";
  
  if (isHuaweiOrHarmony()) {
    msg += "\n\n❗ 华为 / 鸿蒙系统必须开启代理才能正常运行！";
  } else if (isMobileDevice()) {
    msg += "\n\n如仍无法加载，请尝试开启代理";
  }
  
  alert(msg);
}

window.onload = async () => {
  try {
    if (!window.RufflePlayer) {
      showLoadError();
      return;
    }

    const player = window.RufflePlayer.newest().createPlayer();
    document.getElementById("game").appendChild(player);

    await Promise.race([
      player.load({
        url: "game.swf",
        viewport: { width: 760, height: 600 }
      }),
      new Promise((_, reject) => setTimeout(() => reject("timeout"), 15000))
    ]);

    if (isMobileDevice()) {
      initPinchZoom();
    }

  } catch (err) {
    showLoadError();
  }
};

// 双指缩放（仅移动端执行）
function initPinchZoom() {
  const zoomContainer = document.getElementById('zoom-container');
  const gameWrapper = document.getElementById('game-wrapper');
  
  let scale = 1.0;
  let lastDistance = 0;
  let isPinching = false;
  
  function calculateInitialScale() {
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;
    const gameWidth = 760;
    const gameHeight = 600;
    const scaleX = screenWidth / gameWidth;
    const scaleY = screenHeight / gameHeight;
    return Math.min(scaleX, scaleY, 1.0);
  }
  
  function applyTransform() {
    zoomContainer.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  
  function getDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  
  scale = calculateInitialScale();
  applyTransform();
  
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      isPinching = true;
      lastDistance = getDistance(e.touches);
      e.preventDefault(); // 防止浏览器默认缩放
    }
  });
  
  document.addEventListener('touchmove', (e) => {
    if (isPinching && e.touches.length === 2) {
      const currentDistance = getDistance(e.touches);
      const scaleChange = currentDistance / lastDistance;
      scale = Math.max(0.3, Math.min(5.0, scale * scaleChange));
      applyTransform();
      lastDistance = currentDistance;
      e.preventDefault(); // 防止浏览器默认缩放
    }
  });
  
  document.addEventListener('touchend', () => {
    isPinching = false;
  });

  document.addEventListener('dblclick', () => {
    scale = calculateInitialScale();
    applyTransform();
  });
}

// 游戏提示
alert("某大学的七位学科工程师受聘先后前往荒岛山谷进行开发和建设。\r\n  \r\n因此您需要选择决定工程师们前往岛屿的顺序。\r\n \r\n")
alert("不同的排列组合将会影响工程师们的等级和最终岛屿开发的程度和结局。\r\n")
alert("注意工程师们的上岛顺序很重要！工程师们之间的联动配合程度会影响建设的程度和结局。")
alert("游戏存在多个普通结局，一个完美结局，一个彩蛋结局。")
alert("Remastered by: 老六 - Mokie")

// ✅ 只有真正的移动设备才显示手机端提示
if (isMobileDevice()) {
  alert("手机端提示：您可以使用双指捏合手势放大缩小游戏画面，双击屏幕可重置大小。");
}
alert("祝您玩得开心！加载完后点击按钮开始。");
</script>
</body>
</html>

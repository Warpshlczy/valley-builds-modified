<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- 手机端适配 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center; 
  align-items: center;    
  background: #222;
}

#game ruffle-player {
  width: 760px !important;
  height: 600px !important;
  display: block;
}

#game canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}

/* 手机端游戏容器适配 */
#game {
  width: 760px;
  height: 600px;
}
</style>
</head>
<body>
<div id="game"></div>

<script>
// 检测设备
const isMobile = /Android|iPhone|iPad|iPod|HarmonyOS/i.test(navigator.userAgent);
const gameContainer = document.getElementById('game');

// ===================== 手机端：原生标签 + CDN（彻底解决WASM报错） =====================
if (isMobile) {
    // 加载CDN
    const cdnScript = document.createElement('script');
    cdnScript.src = "https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle";
    document.head.appendChild(cdnScript);

    // 手机端用原生嵌入标签（唯一不报错的方案）
    cdnScript.onload = () => {
        gameContainer.innerHTML = `<ruffle-embed src="game.swf" width="760" height="600"></ruffle-embed>`;
    };
} 
// ===================== 电脑端：自托管 + 原有代码（防浏览器拦截） =====================
else {
    const localScript = document.createElement('script');
    localScript.src = "ruffle/ruffle.js";
    localScript.onload = async () => {
        const player = window.RufflePlayer.newest().createPlayer();
        gameContainer.appendChild(player);
        await player.load({
            url: "game.swf",
            viewport: { width: 760, height: 600 }
        });
    };
    document.head.appendChild(localScript);
}

// ===================== 你原有的所有弹窗（完全保留） =====================
alert("某大学的七位各学科工程师受世界首富聘请先后前往荒岛山谷进行开发和建设。\r\n  \r\n因此您需要选择决定工程师们前往岛屿的顺序。\r\n \r\n")
alert("不同的排列组合将会影响工程师们的等级和最终岛屿开发的程度和结局。\r\n")
alert("注意工程师们的上岛顺序很重要！工程师们之间的联动配合程度会影响建设的程度和结局。")
alert("游戏存在多个普通结局，一个完美结局，一个彩蛋结局。")
alert("祝您玩得开心！加载完后点击按钮开始。")
</script>
</body>
</html>

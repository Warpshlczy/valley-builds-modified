<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- 添加移动端视口设置，允许双指缩放 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes">
<script src="ruffle/ruffle.js"></script>
<style>

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center; 
  align-items: center;    
  background: #222;
  /* 防止移动端双击缩放和长按选择 */
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

#game {
  /* 移动端自适应宽度 */
  max-width: 100vw;
  max-height: 100vh;
}

#game ruffle-player {
  width: 760px !important;
  height: 600px !important;
  display: block;
  /* 移动端保持比例缩放 */
  max-width: 100% !important;
  max-height: 100vh !important;
  object-fit: contain;
}

#game canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
  /* 确保canvas也支持缩放 */
  touch-action: auto !important;
}
</style>
</head>
<body>
<div id="game"></div>

<script>
window.onload = async () => {
  const player = window.RufflePlayer.newest().createPlayer();
  document.getElementById("game").appendChild(player);

  await player.load({
    url: "game.swf",
    viewport: { width: 760, height: 600 }
  });
};
    alert("某大学的七位各学科工程师受世界首富聘请先后前往荒岛山谷进行开发和建设。\r\n  \r\n因此您需要选择决定工程师们前往岛屿的顺序。\r\n \r\n")
    alert("不同的排列组合将会影响工程师们的等级和最终岛屿开发的程度和结局。\r\n")
    alert("注意工程师们的上岛顺序很重要！工程师们之间的联动配合程度会影响建设的程度和结局。")
    alert("游戏存在多个普通结局，一个完美结局，一个彩蛋结局。")
    alert("祝您玩得开心！加载完后点击按钮开始。")
</script>
</body>
</html>
